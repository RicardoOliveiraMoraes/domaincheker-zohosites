<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain Finder · .com.br</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #07090F;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Gradient orbs ─────────────────────────────────────── */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; filter: blur(80px); z-index: 0;
    }
    .orb-red  { top:-200px; right:-200px; width:500px; height:500px;
                background: radial-gradient(circle, rgba(228,37,39,.22), transparent 70%); }
    .orb-blue { bottom:-200px; left:-200px; width:500px; height:500px;
                background: radial-gradient(circle, rgba(59,130,246,.1), transparent 70%); }

    /* ── Header ────────────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .logo {
      width: 36px; height: 36px; border-radius: 12px;
      background: #E42527; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; color: #fff;
      box-shadow: 0 0 18px rgba(228,37,39,.5); flex-shrink: 0;
    }
    .logo-title { font-weight: 600; font-size: 16px; letter-spacing: -.3px; }
    .logo-badge {
      font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px;
      background: rgba(255,255,255,.06); color: rgba(255,255,255,.4);
      border: 1px solid rgba(255,255,255,.08);
    }

    /* ── Main layout ───────────────────────────────────────── */
    main {
      position: relative; z-index: 10;
      min-height: calc(100vh - 70px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ── Glass card ────────────────────────────────────────── */
    .card {
      width: 100%; max-width: 460px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px; padding: 32px;
      backdrop-filter: blur(20px);
      animation: fadeUp .35s ease both;
    }

    /* ── Stepper ───────────────────────────────────────────── */
    .stepper {
      display: flex; align-items: center;
      justify-content: center; gap: 0; margin-bottom: 36px;
    }
    .step-item { display: flex; flex-direction: column; align-items: center; }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      transition: all .3s;
    }
    .step-dot.done   { background: #E42527; border: 2px solid #E42527; color: #fff; }
    .step-dot.active { background: rgba(228,37,39,.12); border: 2px solid #E42527; color: #E42527; }
    .step-dot.idle   { background: rgba(255,255,255,.04); border: 2px solid rgba(255,255,255,.1); color: rgba(255,255,255,.25); }
    .step-label { font-size: 10px; font-weight: 600; margin-top: 6px; transition: color .3s; }
    .step-line {
      flex: 1; max-width: 44px; height: 1px; margin: 0 4px; margin-bottom: 22px;
      transition: background .4s;
    }
    .step-line.done { background: #E42527; }
    .step-line.idle { background: rgba(255,255,255,.1); }

    /* ── Step header ───────────────────────────────────────── */
    .step-eyebrow {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #E42527; margin-bottom: 8px;
    }
    .step-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .step-sub   { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 28px; }

    /* ── Form fields ───────────────────────────────────────── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: rgba(255,255,255,.4); margin-bottom: 8px;
    }
    .field label span { text-transform: none; letter-spacing: 0; font-weight: 400; color: rgba(255,255,255,.2); }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 14px;
      padding: 13px 16px; color: #fff; font-size: 14px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    input::placeholder { color: rgba(255,255,255,.22); }
    input:focus {
      border-color: #E42527;
      box-shadow: 0 0 0 3px rgba(228,37,39,.14);
    }

    /* ── Grid selectors ────────────────────────────────────── */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    .sel-card {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .sel-card:hover { border-color: rgba(228,37,39,.4); background: rgba(228,37,39,.05); }
    .sel-card.active {
      border-color: #E42527; background: rgba(228,37,39,.12);
      box-shadow: 0 0 14px rgba(228,37,39,.2);
    }
    .sel-card-sm { padding: 10px 6px; }
    .sel-card-sm .icon { font-size: 18px; display: block; margin-bottom: 4px; }
    .sel-card-sm .lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.55); }
    .sel-card-sm.active .lbl { color: #FF6B6B; }
    .sel-card-lg { padding: 16px; text-align: left; }
    .sel-card-lg .icon { font-size: 22px; margin-bottom: 8px; display: block; }
    .sel-card-lg .lbl { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.8); margin-bottom: 4px; }
    .sel-card-lg .desc { font-size: 11px; color: rgba(255,255,255,.3); line-height: 1.5; }
    .sel-card-lg.active .lbl { color: #FF6B6B; }
    .sel-card-md { padding: 14px; text-align: left; }
    .sel-card-md .lbl  { font-size: 13px; font-weight: 700; margin-bottom: 3px; color: rgba(255,255,255,.8); }
    .sel-card-md .desc { font-size: 11px; color: rgba(255,255,255,.3); }
    .sel-card-md.active .lbl { color: #FF6B6B; }

    /* ── Keyword tags ──────────────────────────────────────── */
    .kw-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .kw-row input { flex: 1; }
    .kw-row button {
      flex-shrink: 0; width: 44px; border: none; border-radius: 14px;
      background: #E42527; color: #fff; font-size: 20px; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .kw-row button:disabled { opacity: .3; cursor: not-allowed; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 4px; }
    .tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
      background: rgba(228,37,39,.15); border: 1px solid rgba(228,37,39,.3); color: #FF6B6B;
    }
    .tag button {
      border: none; background: none; color: inherit; cursor: pointer;
      font-size: 14px; line-height: 1; opacity: .6; padding: 0;
    }
    .tag button:hover { opacity: 1; }

    /* ── Summary pill row ──────────────────────────────────── */
    .summary-box {
      border-radius: 14px; padding: 14px 16px; margin-bottom: 20px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    }
    .summary-box p { font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: rgba(255,255,255,.3); margin-bottom: 10px; }
    .summary-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      font-size: 11px; padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.55);
    }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-row { display: flex; gap: 10px; margin-top: 28px; }
    .btn { border: none; border-radius: 14px; padding: 14px 20px; font-size: 14px;
           font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
    .btn-back {
      flex: 1; background: rgba(255,255,255,.06); color: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.08);
    }
    .btn-back:hover { background: rgba(255,255,255,.1); }
    .btn-next {
      flex: 2; background: #E42527; color: #fff;
      box-shadow: 0 0 24px rgba(228,37,39,.35);
    }
    .btn-next:hover { opacity: .9; }
    .btn-next:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }
    .btn-full { width: 100%; margin-top: 28px; background: #E42527; color: #fff;
                box-shadow: 0 0 28px rgba(228,37,39,.4); }
    .btn-full:hover { opacity: .9; }
    .btn-full:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

    /* ── Results ───────────────────────────────────────────── */
    .results-wrap { width: 100%; max-width: 520px; animation: fadeUp .35s ease both; }
    .results-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px;
    }
    .results-header h2 { font-size: 20px; font-weight: 700; }
    .results-header p  { font-size: 13px; color: rgba(255,255,255,.4); margin-top: 4px; }
    .btn-new {
      flex-shrink: 0; border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
      padding: 8px 14px; background: rgba(255,255,255,.05); color: rgba(255,255,255,.5);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .btn-new:hover { background: rgba(255,255,255,.1); }

    /* progress */
    .progress-bar { height: 3px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; margin-bottom: 20px; }
    .progress-fill { height: 100%; border-radius: 999px;
                     background: linear-gradient(90deg,#E42527,#FF6B6B); transition: width .3s; }

    /* saved notice */
    .saved-notice {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
      padding: 10px 14px; border-radius: 14px; font-size: 12px; font-weight: 600;
      background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); color: #4ADE80;
    }

    /* filter tabs */
    .filter-tabs {
      display: flex; gap: 4px; padding: 4px; border-radius: 16px; margin-bottom: 14px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
    }
    .filter-tab {
      flex: 1; padding: 7px 4px; border: none; border-radius: 12px;
      font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s;
      background: transparent; color: rgba(255,255,255,.3); font-family: inherit;
    }
    .filter-tab.active { background: rgba(255,255,255,.08); color: #fff; }

    /* domain list */
    #domain-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .d-card {
      display: flex; align-items: center; justify-content: space-between;
      border-radius: 14px; padding: 13px 16px; transition: all .2s;
    }
    .d-card.checking {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
      animation: blink 1.4s ease-in-out infinite;
    }
    .d-card.available { background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.25); }
    .d-card.taken     { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); }
    .d-left { display: flex; align-items: center; gap: 10px; }
    .d-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .d-dot.checking { background: rgba(255,255,255,.15); }
    .d-dot.available{ background: #22C55E; }
    .d-dot.taken    { background: rgba(255,255,255,.2); }
    .d-name { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }
    .d-name.checking { color: rgba(255,255,255,.2); }
    .d-name.available{ color: #fff; }
    .d-name.taken    { color: rgba(255,255,255,.35); }
    .d-right { display: flex; align-items: center; gap: 8px; }
    .badge {
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px;
    }
    .badge.checking  { background: rgba(255,255,255,.06); color: rgba(255,255,255,.2); }
    .badge.available { background: rgba(34,197,94,.15); color: #4ADE80; }
    .badge.taken     { background: rgba(255,255,255,.06); color: rgba(255,255,255,.3); }
    .register-btn {
      background: #E42527; color: #fff; border: none; border-radius: 10px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
      text-decoration: none; display: inline-block;
      box-shadow: 0 0 10px rgba(228,37,39,.4); font-family: inherit;
    }
    .register-btn:hover { opacity: .85; }

    .rdap-note { text-align: center; font-size: 11px; color: rgba(255,255,255,.18); margin-top: 20px; }

    /* ── Animations ────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes blink {
      0%,100% { opacity:1 } 50% { opacity:.45 }
    }
  </style>
</head>
<body>

  <div class="orb orb-red"></div>
  <div class="orb orb-blue"></div>

  <header>
    <div class="logo">D</div>
    <span class="logo-title">Domain Finder</span>
    <span class="logo-badge">.com.br</span>
  </header>

  <main id="main"></main>

  <script>
  /* ══════════════════════════════════════════════════════════
     CONFIG — atualize a URL após fazer o deploy da função
  ══════════════════════════════════════════════════════════ */
  const CATALYST_LEADS_URL =
    'https://newppp-766202007.development.catalystserverless.com/server/leads_api';

  const RDAP_BASE = 'https://rdap.registro.br';

  /* ── Data ─────────────────────────────────────────────── */
  const SECTORS = [
    { v:'tech',         l:'Tecnologia',  i:'💻' },
    { v:'retail',       l:'Varejo',       i:'🛍️' },
    { v:'health',       l:'Saúde',        i:'🏥' },
    { v:'education',    l:'Educação',     i:'🎓' },
    { v:'finance',      l:'Financeiro',   i:'💰' },
    { v:'services',     l:'Serviços',     i:'🤝' },
    { v:'food',         l:'Alimentação',  i:'🍽️' },
    { v:'construction', l:'Construção',   i:'🏗️' },
    { v:'other',        l:'Outro',        i:'📦' },
  ];

  const AUDIENCES = [
    { v:'b2c',  l:'B2C',   d:'Pessoas físicas' },
    { v:'b2b',  l:'B2B',   d:'Empresas' },
    { v:'both', l:'Ambos', d:'Todos os públicos' },
  ];

  const STYLES = [
    { v:'descriptive', l:'Descritivo',   d:'Nome completo e variações', i:'📝' },
    { v:'short',       l:'Curto',         d:'Siglas e versões compactas', i:'⚡' },
    { v:'creative',    l:'Criativo',      d:'Prefixos modernos (go, my…)', i:'✨' },
    { v:'location',    l:'Localização',   d:'Adiciona SP, RJ, BR…', i:'📍' },
  ];

  const STEP_LABELS = ['Contato','Empresa','Negócio','Estilo'];

  /* ── State ────────────────────────────────────────────── */
  let state = {
    step: 0,
    form: {
      name:'', email:'', phone:'',
      companyName:'', sector:'',
      keywords:[], audience:'b2c', style:'descriptive',
    },
    kwInput: '',
    results: [],
    status: 'idle',    // idle | loading | done
    filter: 'all',
    leadSaved: false,
  };

  function setState(patch) {
    Object.assign(state, patch);
    if ('form' in patch) state.form = { ...state.form, ...patch.form };
    render();
  }
  function setForm(patch) { setState({ form: { ...state.form, ...patch } }); }

  /* ── Domain generator ─────────────────────────────────── */
  const BIZ_SUFFIXES = ['ltda','me','sa','eireli','ei','ss','epp','sas','grupo','group'];

  const SECTOR_TERMS = {
    tech:['tech','digital','sistemas','dev','software','cloud'],
    retail:['loja','store','shop','vendas'],
    health:['saude','health','med','clinica','vida'],
    education:['edu','cursos','learn','escola','academy'],
    finance:['financeiro','fin','capital','invest'],
    services:['solucoes','pro','expert','hub'],
    food:['food','chef','sabor','gourmet'],
    construction:['obras','engenharia','imoveis'],
    other:['brasil','br','online','web'],
  };

  const STYLE_PREFIXES = { creative:['get','my','go','be'] };
  const STYLE_SUFFIXES = {
    descriptive:['digital','online','brasil'],
    location:['sp','rj','br','brasil'],
    creative:['hub','lab','app','link'],
  };

  function slugify(t) {
    return t.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g,'')
      .replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-');
  }

  function generateDomains({ companyName, sector, keywords, audience, style }) {
    if (!companyName.trim()) return [];
    const words = slugify(companyName).split('-').filter(Boolean)
                    .filter(w => !BIZ_SUFFIXES.includes(w));
    if (!words.length) return [];
    const base    = words.join('');
    const hyphen  = words.length > 1 ? words.join('-') : null;
    const abbrev  = words.map(w => w[0]).join('');
    const kwSlugs = (keywords||[]).map(k => slugify(k).replace(/-/g,'')).filter(k => k.length >= 2);
    const sts     = SECTOR_TERMS[sector] || SECTOR_TERMS.other;
    const pfx     = STYLE_PREFIXES[style] || [];
    const sfx     = STYLE_SUFFIXES[style] || [];
    const set = new Set();
    set.add(base);
    if (hyphen) set.add(hyphen);
    if (style === 'short' && abbrev.length >= 2) {
      set.add(abbrev);
      if (words.length > 1) set.add(words[0]);
    }
    sts.slice(0,4).forEach(t => { set.add(base+t); if(style!=='short') set.add(t+base); });
    kwSlugs.forEach(k => { set.add(base+k); set.add(k+base); if(words.length>1) set.add(words[0]+k); });
    pfx.forEach(p => !base.startsWith(p) && set.add(p+base));
    sfx.forEach(s => !base.endsWith(s) && set.add(base+s));
    if (audience==='b2b') { set.add(base+'b2b'); set.add(base+'empresas'); }
    if (audience==='b2c') set.add(base+'online');
    return [...set].filter(d => d.length>=2 && d.length<=63).map(d => d+'.com.br').slice(0,20);
  }

  /* ── RDAP checker ─────────────────────────────────────── */
  const DELAY = 300;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function checkDomain(domain) {
    try {
      const res = await fetch(`${RDAP_BASE}/domain/${domain}`,
        { headers: { Accept: 'application/rdap+json' } });
      if (res.status === 404) return { domain, status:'available' };
      if (res.ok)             return { domain, status:'taken' };
      return { domain, status:'error' };
    } catch { return { domain, status:'error' }; }
  }

  /* ── Lead saver ───────────────────────────────────────── */
  async function saveLead() {
    const f = state.form;
    try {
      await fetch(CATALYST_LEADS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: f.name, email: f.email, phone: f.phone,
          company_name: f.companyName, sector: f.sector,
          keywords: f.keywords, audience: f.audience, domain_style: f.style,
        }),
      });
      setState({ leadSaved: true });
    } catch { /* non-blocking */ }
  }

  /* ── Search ───────────────────────────────────────────── */
  let searchAborted = false;

  async function handleSearch() {
    searchAborted = false;
    const domains = generateDomains(state.form);
    const results = domains.map(d => ({ domain: d, status: 'checking' }));
    Object.assign(state, { results, status: 'loading', step: 4, filter: 'all' });
    render();
    saveLead();

    for (const r of results) {
      if (searchAborted) break;
      const res = await checkDomain(r.domain);
      // update in place & patch DOM card
      const idx = state.results.findIndex(x => x.domain === r.domain);
      if (idx >= 0) state.results[idx] = res;
      patchCard(res);
      await sleep(DELAY);
    }
    if (!searchAborted) {
      state.status = 'done';
      renderFilterTabs();
      renderSubtitle();
    }
  }

  function patchCard({ domain, status }) {
    const el = document.getElementById('dc-' + domain.replace(/\./g, '_'));
    if (!el) return;
    const isAvailable = status === 'available';
    el.className = `d-card ${status === 'available' ? 'available' : 'taken'}`;
    el.innerHTML = domainCardInner({ domain, status });
    el.style.animation = 'none';
  }

  function renderFilterTabs() {
    const ft = document.getElementById('filter-tabs');
    if (!ft) return;
    ft.style.display = 'flex';
    ft.innerHTML = filterTabsHTML();
    ft.querySelectorAll('.filter-tab').forEach(b =>
      b.addEventListener('click', () => { state.filter = b.dataset.f; renderFilterTabs(); renderDomainList(); })
    );
  }

  function renderSubtitle() {
    const el = document.getElementById('result-sub');
    if (!el) return;
    const av = state.results.filter(r => r.status === 'available').length;
    el.textContent = `${state.results.length} sugestões · ${av} disponíve${av===1?'l':'is'}`;
  }

  function renderDomainList() {
    const el = document.getElementById('domain-list');
    if (!el) return;
    const list = state.filter === 'available'
      ? state.results.filter(r => r.status === 'available')
      : state.filter === 'registered'
      ? state.results.filter(r => r.status === 'taken')
      : state.results;
    el.innerHTML = list.map(r => domainCardHTML(r)).join('');
  }

  /* ── HTML builders ────────────────────────────────────── */
  function stepper() {
    const s = state.step < 4 ? state.step : 4;
    return `<div class="stepper">
      ${STEP_LABELS.map((l, i) => `
        <div class="step-item">
          <div class="step-dot ${i < s ? 'done' : i === s ? 'active' : 'idle'}">
            ${i < s ? '✓' : i + 1}
          </div>
          <span class="step-label" style="color:${i<=s?'rgba(255,255,255,.65)':'rgba(255,255,255,.22)'}">
            ${l}
          </span>
        </div>
        ${i < STEP_LABELS.length - 1
          ? `<div class="step-line ${i < s ? 'done' : 'idle'}"></div>`
          : ''}
      `).join('')}
    </div>`;
  }

  function fieldHTML(id, label, type, value, placeholder, optional) {
    return `<div class="field">
      <label for="${id}">${label}${optional ? ' <span>(opcional)</span>' : ''}</label>
      <input id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}" autocomplete="off" />
    </div>`;
  }

  function sectorGrid() {
    return `<div class="grid-3" style="margin-bottom:0">
      ${SECTORS.map(s => `
        <div class="sel-card sel-card-sm ${state.form.sector===s.v?'active':''}"
             data-type="sector" data-v="${s.v}">
          <span class="icon">${s.i}</span>
          <span class="lbl">${s.l}</span>
        </div>`).join('')}
    </div>`;
  }

  function audienceGrid() {
    return `<div class="grid-3">
      ${AUDIENCES.map(a => `
        <div class="sel-card sel-card-md ${state.form.audience===a.v?'active':''}"
             data-type="audience" data-v="${a.v}">
          <div class="lbl">${a.l}</div>
          <div class="desc">${a.d}</div>
        </div>`).join('')}
    </div>`;
  }

  function styleGrid() {
    return `<div class="grid-2">
      ${STYLES.map(s => `
        <div class="sel-card sel-card-lg ${state.form.style===s.v?'active':''}"
             data-type="style" data-v="${s.v}">
          <span class="icon">${s.i}</span>
          <div class="lbl">${s.l}</div>
          <div class="desc">${s.d}</div>
        </div>`).join('')}
    </div>`;
  }

  function kwSection() {
    return `
      <div class="field">
        <label>Palavras-chave <span>(até 5 — Enter para adicionar)</span></label>
        <div class="kw-row">
          <input id="kw-input" type="text" value="${esc(state.kwInput)}"
                 placeholder="inovação, automação…" />
          <button id="kw-add" ${state.form.keywords.length>=5?'disabled':''}>+</button>
        </div>
        <div class="tag-list">
          ${state.form.keywords.map(k =>
            `<span class="tag">${esc(k)}<button data-kw="${esc(k)}">×</button></span>`
          ).join('')}
        </div>
      </div>`;
  }

  function summaryBox() {
    const pills = [
      state.form.name, state.form.email,
      state.form.companyName,
      SECTORS.find(s=>s.v===state.form.sector)?.l,
      ...state.form.keywords,
      AUDIENCES.find(a=>a.v===state.form.audience)?.l,
    ].filter(Boolean);
    return `<div class="summary-box">
      <p>Resumo da busca</p>
      <div class="summary-pills">
        ${pills.map(p=>`<span class="pill">${esc(p)}</span>`).join('')}
      </div>
    </div>`;
  }

  function domainCardInner({ domain, status }) {
    const isAvail = status === 'available';
    const label   = status === 'available' ? 'Disponível' : status === 'taken' ? 'Registrado' : '…';
    return `
      <div class="d-left">
        <span class="d-dot ${status}"></span>
        <span class="d-name ${status}">${esc(domain)}</span>
      </div>
      <div class="d-right">
        <span class="badge ${status}">${label}</span>
        ${isAvail ? `<a class="register-btn" href="https://registro.br/busca-dominio/?fqdn=${esc(domain)}" target="_blank" rel="noopener">Registrar</a>` : ''}
      </div>`;
  }

  function domainCardHTML({ domain, status }) {
    const cls = status === 'available' ? 'available' : status === 'taken' ? 'taken' : 'checking';
    return `<li class="d-card ${cls}" id="dc-${domain.replace(/\./g,'_')}">${domainCardInner({domain,status})}</li>`;
  }

  function filterTabsHTML() {
    const av = state.results.filter(r=>r.status==='available').length;
    const tk = state.results.filter(r=>r.status==='taken').length;
    return [
      { k:'all',        l:`Todos (${state.results.length})` },
      { k:'available',  l:`Disponíveis (${av})` },
      { k:'registered', l:`Registrados (${tk})` },
    ].map(t => `<button class="filter-tab ${state.filter===t.k?'active':''}" data-f="${t.k}">${t.l}</button>`).join('');
  }

  /* ── Email validation ─────────────────────────────────── */
  function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

  /* ── Render ───────────────────────────────────────────── */
  function render() {
    const el = document.getElementById('main');
    const f  = state.form;

    if (state.step === 4) {
      const av = state.results.filter(r=>r.status==='available').length;
      el.innerHTML = `
        <div class="results-wrap">
          <div class="results-header">
            <div>
              <h2>Sugestões de domínio</h2>
              <p id="result-sub">
                ${state.status==='loading'
                  ? `Verificando domínios…`
                  : `${state.results.length} sugestões · ${av} disponíve${av===1?'l':'is'}`}
              </p>
            </div>
            <button class="btn-new" id="btn-new">← Nova busca</button>
          </div>
          ${state.leadSaved ? `<div class="saved-notice">✓ Seus dados foram salvos — entraremos em contato.</div>` : ''}
          <div class="progress-bar" id="progress-bar" style="${state.status==='done'?'display:none':''}">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
          <div class="filter-tabs" id="filter-tabs" style="${state.status!=='done'?'display:none':''}">
            ${filterTabsHTML()}
          </div>
          <ul id="domain-list">
            ${state.results.map(r => domainCardHTML(r)).join('')}
          </ul>
          <p class="rdap-note">Consulta via RDAP · Registro.br</p>
        </div>`;
      attachResults();
      if (state.status === 'loading') startProgressAnimation();
      return;
    }

    let inner = '';

    if (state.step === 0) {
      const ok = f.name.trim().length >= 2 && validEmail(f.email);
      inner = `
        <div class="card fade-in">
          ${stepper()}
          <p class="step-eyebrow">Etapa 1 de 4</p>
          <h2 class="step-title">Quem está buscando?</h2>
          <p class="step-sub">Vamos personalizar as sugestões para você.</p>
          ${fieldHTML('f-name','Nome completo','text',f.name,'Seu nome',false)}
          ${fieldHTML('f-email','E-mail','email',f.email,'voce@empresa.com.br',false)}
          ${fieldHTML('f-phone','Telefone','tel',f.phone,'(11) 99999-9999',true)}
          <button class="btn full-width btn-full" id="btn-next-0" ${ok?'':'disabled'}>
            Continuar →
          </button>
        </div>`;
    }

    if (state.step === 1) {
      const ok = f.companyName.trim().length >= 2 && !!f.sector;
      inner = `
        <div class="card fade-in">
          ${stepper()}
          <p class="step-eyebrow">Etapa 2 de 4</p>
          <h2 class="step-title">Sobre a empresa</h2>
          <p class="step-sub">Nome e setor de atuação.</p>
          ${fieldHTML('f-company','Nome da empresa ou marca','text',f.companyName,'Ex: Empresa ABC, Studio Digital…',false)}
          <div class="field">
            <label>Setor de atuação</label>
            ${sectorGrid()}
          </div>
          <div class="btn-row">
            <button class="btn btn-back" id="btn-back">← Voltar</button>
            <button class="btn btn-next" id="btn-next-1" ${ok?'':'disabled'}>Continuar →</button>
          </div>
        </div>`;
    }

    if (state.step === 2) {
      inner = `
        <div class="card fade-in">
          ${stepper()}
          <p class="step-eyebrow">Etapa 3 de 4</p>
          <h2 class="step-title">Detalhes do negócio</h2>
          <p class="step-sub">Quanto mais contexto, melhores as sugestões.</p>
          ${kwSection()}
          <div class="field" style="margin-top:20px">
            <label>Público-alvo</label>
            ${audienceGrid()}
          </div>
          <div class="btn-row">
            <button class="btn btn-back" id="btn-back">← Voltar</button>
            <button class="btn btn-next" id="btn-next-2">Continuar →</button>
          </div>
        </div>`;
    }

    if (state.step === 3) {
      inner = `
        <div class="card fade-in">
          ${stepper()}
          <p class="step-eyebrow">Etapa 4 de 4</p>
          <h2 class="step-title">Estilo do domínio</h2>
          <p class="step-sub">Qual formato combina com a sua marca?</p>
          <div class="field">${styleGrid()}</div>
          ${summaryBox()}
          <div class="btn-row">
            <button class="btn btn-back" id="btn-back">← Voltar</button>
            <button class="btn btn-next" id="btn-search">🔍 Buscar domínios</button>
          </div>
        </div>`;
    }

    el.innerHTML = inner;
    attachForm();
  }

  /* ── Event listeners ──────────────────────────────────── */
  function attachForm() {
    const step = state.step;

    // Text inputs
    const inputMap = {
      'f-name':    v => setForm({ name: v }),
      'f-email':   v => setForm({ email: v }),
      'f-phone':   v => setForm({ phone: v }),
      'f-company': v => setForm({ companyName: v }),
    };
    Object.entries(inputMap).forEach(([id, fn]) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('input', () => fn(el.value));
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const nxt = document.getElementById(
            step===0 ? 'btn-next-0' :
            step===1 ? 'btn-next-1' : null);
          if (nxt && !nxt.disabled) nxt.click();
        }
      });
      // autofocus first field
      if (id === 'f-name' || id === 'f-company') setTimeout(() => el.focus(), 50);
    });

    // Selector cards
    document.querySelectorAll('[data-type]').forEach(card => {
      card.addEventListener('click', () => {
        const t = card.dataset.type, v = card.dataset.v;
        if (t === 'sector')   setForm({ sector: v });
        if (t === 'audience') setForm({ audience: v });
        if (t === 'style')    setForm({ style: v });
      });
    });

    // Keyword input
    const kwIn  = document.getElementById('kw-input');
    const kwAdd = document.getElementById('kw-add');
    if (kwIn) {
      kwIn.addEventListener('input', e => { state.kwInput = e.target.value; });
      kwIn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addKeyword(); }
      });
      setTimeout(() => kwIn.focus(), 50);
    }
    if (kwAdd) kwAdd.addEventListener('click', addKeyword);

    // Keyword remove
    document.querySelectorAll('[data-kw]').forEach(btn => {
      btn.addEventListener('click', () => {
        setForm({ keywords: state.form.keywords.filter(k => k !== btn.dataset.kw) });
      });
    });

    // Navigation
    const back = document.getElementById('btn-back');
    if (back) back.addEventListener('click', () => setState({ step: state.step - 1 }));

    const n0 = document.getElementById('btn-next-0');
    if (n0) n0.addEventListener('click', () => setState({ step: 1 }));

    const n1 = document.getElementById('btn-next-1');
    if (n1) n1.addEventListener('click', () => setState({ step: 2 }));

    const n2 = document.getElementById('btn-next-2');
    if (n2) n2.addEventListener('click', () => setState({ step: 3 }));

    const srch = document.getElementById('btn-search');
    if (srch) srch.addEventListener('click', handleSearch);
  }

  function attachResults() {
    const nb = document.getElementById('btn-new');
    if (nb) nb.addEventListener('click', () => {
      searchAborted = true;
      setState({ step: 0, results: [], status: 'idle', leadSaved: false, filter: 'all' });
    });
    document.querySelectorAll('.filter-tab').forEach(b =>
      b.addEventListener('click', () => {
        state.filter = b.dataset.f;
        renderFilterTabs();
        renderDomainList();
      })
    );
  }

  function addKeyword() {
    const kw = state.kwInput.trim();
    if (kw && !state.form.keywords.includes(kw) && state.form.keywords.length < 5) {
      state.kwInput = '';
      setForm({ keywords: [...state.form.keywords, kw] });
    }
  }

  let progressInterval = null;
  function startProgressAnimation() {
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      const fill = document.getElementById('progress-fill');
      const bar  = document.getElementById('progress-bar');
      if (!fill) { clearInterval(progressInterval); return; }
      const done = state.results.filter(r => r.status !== 'checking').length;
      const pct  = state.results.length > 0 ? (done / state.results.length) * 100 : 0;
      fill.style.width = pct + '%';
      if (state.status === 'done') {
        clearInterval(progressInterval);
        if (bar) bar.style.display = 'none';
      }
    }, 200);
  }

  /* ── Util ─────────────────────────────────────────────── */
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Init ─────────────────────────────────────────────── */
  render();
  </script>
</body>
</html>
